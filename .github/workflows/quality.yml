name: Quality

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            tools/terrain-builder/package-lock.json
            assets/web/package-lock.json

      - name: Install terrain tooling
        run: npm ci
        working-directory: tools/terrain-builder

      - name: Install web tooling
        run: npm ci
        working-directory: assets/web

      - name: Build web TypeScript
        run: npm run build
        working-directory: assets/web

      - name: Build C#
        run: dotnet build

      - name: Test C#
        run: dotnet test tests\FireLogistics.Core.Tests\FireLogistics.Core.Tests.csproj

      - name: Test web
        run: node --test tests\web\app.test.js tests\web\terrain-dem.test.js tests\web\contracts.test.js

      - name: Check repository contracts
        shell: pwsh
        run: .\tools\quality\check_repo_contracts.ps1
